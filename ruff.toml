line-length = 120
target-version = "py311"

[lint]
select = ["E", "F", "I"]
ignore = [
    "E501",  # line too long — handled by formatter
]

[lint.per-file-ignores]
"backend/main.py" = ["E402"]       # load_dotenv() must run before imports
"agent/evaluate.py" = ["E402"]     # sys.path + load_dotenv before imports
"agent/run.py" = ["E402"]          # sys.path before imports
"backend/tests/*" = ["E402", "F401"]
