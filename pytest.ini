[pytest]
testpaths = backend/tests verifyn/agent/tests
pythonpath = .
markers =
    e2e: end-to-end tests requiring real API keys (OPENAI_API_KEY). Skipped by default, run with --run-e2e.
filterwarnings =
    ignore:.*AgentStatePydantic.*:DeprecationWarning
    ignore:.*create_react_agent has been moved.*:DeprecationWarning
