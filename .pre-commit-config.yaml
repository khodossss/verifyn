repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.11.6
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: local
    hooks:
      - id: pytest
        name: tests
        entry: pytest agent/tests/ backend/tests/ --ignore=agent/tests/e2e -q --tb=short
        language: system
        pass_filenames: false
        always_run: true
